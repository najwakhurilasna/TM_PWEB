                    <p>Tanggal Keberangkatan</p>
                    <input type="date" class="form-input">

                    <p>Nomor Telepon</p>
                    <input type="text" class="form-input">

                    <p>Upload Foto Identitas</p>
                    <input type="file">

                    <br><br>

                    <button class="btn">Simpan</button>
