<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pemesanan Trip</title>
    <link rel="icon" type="image/png" href="image.png">
</head>

<body>

    <header>
        <h1>Form Pemesanan Open Trip</h1>
    </header>

    <nav>
        <a href="index.html">Dashboard</a> |
        <a href="form.html">Pesan Trip</a> |
        <a href="hal2.html">Daftar Pemesanan</a>
    </nav>

    <hr>

    <main>

        <section>
            <h3>Info Trip</h3>
            <p>Pilih tujuan wisata yang tersedia.</p>
        </section>

        <form>

            <p>Nama Pemesan</p>
            <input type="text">

            <p>Kode Pemesanan</p>
            <input type="text">

            <p>Tujuan Trip</p>
            <select>
                <option>Banyuwangi</option>
                <option>Bali</option>
            </select>

            <p>Jumlah Peserta</p>
            <input type="number">

            <p>Tanggal Keberangkatan</p>
            <input type="date">

            <p>Harga Trip</p>
            <input type="number">

            <p>Upload Foto Identitas</p>
            <input type="file">

            <p>Keterangan</p>
            <textarea></textarea>

            <br><br>

            <button type="submit">Simpan</button>

        </form>

    </main>

    <footer>
        <p>© 2026 Sistem Pemesanan Open Trip</p>
    </footer>

</body>
</html>
